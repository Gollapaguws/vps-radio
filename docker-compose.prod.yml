# docker-compose.prod.yml — VPS Radio production stack
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: .env filled in, init-ssl.sh run, assets/playlist/ populated

services:

  # ── Icecast2 stream server ─────────────────────────────────────────────────
  icecast:
    build:
      context: ./config/icecast
      dockerfile: Dockerfile
    restart: always
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
      - ICECAST_RELAY_PASSWORD=${ICECAST_RELAY_PASSWORD}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD}
      - ICECAST_ADMIN_USER=${ICECAST_ADMIN_USER}
      - ICECAST_HOSTNAME=${DOMAIN}
      - ICECAST_PORT=8000
      - ICECAST_MAX_LISTENERS=${ICECAST_MAX_LISTENERS:-100}
      - STATION_NAME=${STATION_NAME}
      - STATION_DESCRIPTION=${STATION_DESCRIPTION}
      - STATION_GENRE=${STATION_GENRE}
      - STATION_URL=https://${DOMAIN}
    volumes:
      - ./config/icecast/icecast.xml:/etc/icecast2/icecast.xml.template:ro
      - icecast_logs:/var/log/icecast2
    # Port 8000 intentionally NOT exposed to the host — only Nginx reaches it
    # via the internal radio network. iptables rules in setup-vps.sh block
    # external access to port 8000.
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/status.xsl"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - radio

  # ── Liquidsoap fallback playlist ──────────────────────────────────────────
  liquidsoap:
    image: savonet/liquidsoap:v2.3.0
    restart: always
    depends_on:
      icecast:
        condition: service_healthy
    environment:
      - ICECAST_HOSTNAME=icecast
      - ICECAST_PORT=8000
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
      - STATION_NAME=${STATION_NAME}
      - STATION_DESCRIPTION=${STATION_DESCRIPTION}
      - STATION_URL=https://${DOMAIN}
      - STATION_GENRE=${STATION_GENRE}
    volumes:
      - ./config/radio.liq:/etc/liquidsoap/radio.liq:ro
      - ./assets/playlist:/music:ro
      - recordings:/recordings
    command: ["/etc/liquidsoap/radio.liq"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - radio

  # ── Node.js Fastify API ────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      icecast:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - API_PORT=4000
      - API_SECRET=${API_SECRET}
      - ICECAST_HOSTNAME=icecast
      - ICECAST_PORT=8000
      - ICECAST_ADMIN_USER=${ICECAST_ADMIN_USER}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD}
      - STATION_NAME=${STATION_NAME}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - api_data:/app/data
    expose:
      - "4000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - radio

  # ── React web player (pre-built static files served by Nginx) ────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: always
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - radio

  # ── Nginx reverse proxy (TLS termination) ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    depends_on:
      - icecast
      - api
      - web
    volumes:
      - ./config/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    networks:
      - radio

volumes:
  icecast_logs:
  recordings:
  api_data:

networks:
  radio:
    driver: bridge
