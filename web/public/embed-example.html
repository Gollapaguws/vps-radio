<!DOCTYPE html>
<!-- embed-example.html — copy this snippet to embed the VPS Radio player in any website -->
<!-- Replace https://radio.yourdomain.com with your actual domain -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VPS Radio — Embed Example</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #111; color: #eee; }
    .demo-section { margin-bottom: 2rem; }
    pre { background: #1a1a1a; border: 1px solid #333; padding: 1rem; border-radius: 8px;
          overflow: auto; font-size: 0.85rem; color: #a0e0a0; }
  </style>
</head>
<body>

<h1>🎵 VPS Radio Embed Example</h1>

<!-- ─── Live embed demo ──────────────────────────────────────────────── -->
<div class="demo-section">
  <h2>Live Player</h2>
  <iframe
    src="https://radio.yourdomain.com/embed"
    width="100%"
    height="80"
    frameborder="0"
    allow="autoplay"
    title="VPS Radio Player"
    style="border-radius: 8px; display: block;"
  ></iframe>
</div>

<!-- ─── Copy-paste snippet ──────────────────────────────────────────── -->
<div class="demo-section">
  <h2>Copy this snippet</h2>
  <pre><code>&lt;iframe
  src="https://radio.yourdomain.com/embed"
  width="100%"
  height="80"
  frameborder="0"
  allow="autoplay"
  title="VPS Radio Player"
  style="border-radius: 8px; display: block;"
&gt;&lt;/iframe&gt;</code></pre>
</div>

</body>
</html>
