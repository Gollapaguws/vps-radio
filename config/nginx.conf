# nginx.conf — VPS Radio reverse proxy (development)
# Production TLS config is generated by init-ssl.sh

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # Prevent stream bandwidth abuse and API hammering
    limit_req_zone $binary_remote_addr zone=stream:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;

    # Docker's internal DNS resolver — defers upstream DNS to request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream icecast {
        server icecast:8000;
        keepalive 16;
    }

    upstream api {
        server api:4000;
        keepalive 8;
    }

    upstream web {
        server web:3000;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # ── Icecast stream proxy ────────────────────────────────────────────────
        location /stream/ {
            limit_req zone=stream burst=20 nodelay;

            proxy_pass         http://icecast/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Required for audio streaming — disable buffering
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;

            # CORS for embedded players on other domains
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Range" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Block direct access to Icecast admin from outside
        location /stream/admin {
            return 403;
        }

        # ── API proxy ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass         http://api/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── WebSocket (browser DJ source relay) ───────────────────────────────
        location /broadcast {
            proxy_pass         http://api/broadcast;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
        }

        # ── React web player (SPA) ────────────────────────────────────────────
        location / {
            proxy_pass         http://web/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # SPA fallback — all unknown routes go to index.html
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://web/;
        }
    }
}
